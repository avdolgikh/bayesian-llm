experiment:
  name: b3-smoke-test
  run_name: b3-smoke
  mlflow_uri: "sqlite:///mlflow.db"

data:
  dataset: agnews
  id_categories: [2]
  ood_categories: [3, 4]
  val_fraction: 0.1
  test_fraction: 0.1

model:
  block_size: 256
  n_layer: 4
  n_head: 4
  n_embd: 256
  dropout: 0.2
  bias: true
  bayes_head: {enabled: false}
  bayes_ffn: {enabled: false}
  bayes_attn_v: {enabled: false}

lora:
  rank: 4
  alpha: 8.0
  target: ffn
  base_checkpoint: "data/checkpoints/b2_pretrain/ckpt_best.pt"

train:
  steps: 100
  batch_size: 2
  block_size: 128
  lr: 3.0e-4
  warmup_steps: 10
  eval_interval: 50
  eval_iters: 5
  weight_decay: 0.01
  min_lr: 1.0e-5
  grad_clip: 1.0
  gradient_accumulation_steps: 1
  kl_weight: 0.0
  adam_beta1: 0.9
  adam_beta2: 0.95
  seed: 1337
  checkpoint_interval: 100
  checkpoint_dir: "data/checkpoints/b3_smoke"
  device: auto

tfb:
  epsilon: 0.5
  n_search_samples: 2
  n_anchor_batches: 2
  search_min: 1.0e-4
  search_max: 1.0
  search_precision: 0.1

laplace:
  damping: 1.0
  sample_scale: 1.0
  n_curvature_batches: 2
  selection_mode: lora

eval:
  sample_tokens: 10
  temperature: 0.8
  num_samples: 2
  n_perplexity_batches: 2
  qualitative_prompts_per_category: 1
  qualitative_max_new_tokens: 10
  qualitative_seed: 42
