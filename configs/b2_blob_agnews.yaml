experiment:
  name: b2-blob
  run_name: b2-blob-agnews
  mlflow_uri: "sqlite:///mlflow.db"

data:
  dataset: agnews
  id_categories: [1, 2]      # World, Sports
  ood_categories: [3, 4]     # Business, Sci/Tech
  val_fraction: 0.1
  test_fraction: 0.1

model:
  block_size: 256
  n_layer: 4
  n_head: 4
  n_embd: 256
  dropout: 0.2
  bias: true
  bayes_head:
    enabled: false
  bayes_ffn:
    enabled: false
  bayes_attn_v:
    enabled: false

lora:
  rank: 8
  alpha: 16.0
  target: ffn
  prior_std: 0.2
  init_g: 0.05
  base_checkpoint: "data/checkpoints/b2_pretrain/ckpt_best.pt"

train:
  steps: 10000
  batch_size: 32
  block_size: 256
  lr: 1.0e-4
  weight_decay: 0.0
  warmup_steps: 500
  min_lr: 1.0e-5
  grad_clip: 1.0
  eval_interval:  500
  eval_iters: 20
  checkpoint_interval: 2000
  checkpoint_dir: "data/checkpoints/b2_blob"
  gradient_accumulation_steps: 1
  kl_weight: 0.2
  kl_annealing_steps: 2000
  adam_beta1: 0.9
  adam_beta2: 0.95
  seed: 1337
  device: auto

eval:
  sample_tokens: 200
  temperature: 0.8
  num_samples: 20
  n_perplexity_batches: 20
  qualitative_prompts_per_category: 5
  qualitative_max_new_tokens: 100
  qualitative_seed: 42
