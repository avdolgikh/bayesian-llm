experiment:
  name: b3-post-hoc-lora
  run_name: b3-lora-agnews
  mlflow_uri: "sqlite:///mlflow.db"

data:
  dataset: agnews
  id_categories: [2]
  ood_categories: [3, 4]
  val_fraction: 0.1
  test_fraction: 0.1

model:
  block_size: 256
  n_layer: 4
  n_head: 4
  n_embd: 256
  dropout: 0.2
  bias: true
  bayes_head:
    enabled: false
  bayes_ffn:
    enabled: false
  bayes_attn_v:
    enabled: false

lora:
  rank: 16
  alpha: 32.0
  target: ffn
  prior_std: 0.2
  init_g: 0.1
  base_checkpoint: "data/checkpoints/b2_pretrain/ckpt_best.pt"

train:
  steps: 10000
  batch_size: 32
  block_size: 256
  lr: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 500
  min_lr: 1.0e-5
  grad_clip: 1.0
  eval_interval: 500
  eval_iters: 20
  checkpoint_interval: 2000
  checkpoint_dir: "data/checkpoints/b3_lora"
  gradient_accumulation_steps: 1
  kl_weight: 0.0
  adam_beta1: 0.9
  adam_beta2: 0.95
  seed: 1337
  device: auto

tfb:
  epsilon: 0.1
  n_search_samples: 10
  n_anchor_batches: 20
  search_min: 1.0e-4
  search_max: 10.0
  search_precision: 1.0e-4

laplace:
  damping: 1.0
  sample_scale: 1.0
  n_curvature_batches: 20
  selection_mode: lora

eval:
  sample_tokens: 200
  temperature: 0.8
  num_samples: 20
  n_perplexity_batches: 20
  qualitative_prompts_per_category: 5
  qualitative_max_new_tokens: 100
  qualitative_seed: 42
